spring:
  application:
    name: auth
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

auth:
  security:
    server-master-key: tp3-demo-server-master-key
    timestamp-window-seconds: 60
    nonce-ttl-seconds: 120
    token-ttl-seconds: 900
